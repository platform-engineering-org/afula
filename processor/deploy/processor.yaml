apiVersion: batch/v1
kind: CronJob
metadata:
  name: renovate-cronjob
spec:
  schedule: "*/5 * * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 1
  jobTemplate:
    spec:
      template:
        spec:
          containers:
          - name: renovate
            image: renovate/renovate:41.21.1
            args:
              - "--endpoint=github"
              - "--token=$(RENOVATE_TOKEN)"
            envFrom:
            - secretRef:
                name: renovate-env
            imagePullPolicy: IfNotPresent
          restartPolicy: Never
